name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── API (NestJS) ─────────────────────────────────────────────────────────
  api:
    name: API — lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: aihub_test
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB: aihub_test
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U aihub_test" --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5

    env:
      DATABASE_URL: postgresql://aihub_test:test_secret@localhost:5432/aihub_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      LOG_LEVEL: error
      VAULT_TOKEN: test-vault-token

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test --coverage --passWithNoTests

      - name: Integration tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build

  # ── Web (React + Vite) ───────────────────────────────────────────────────
  web:
    name: Web — lint + type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
