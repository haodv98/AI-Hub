# Staging overrides — use with dev stack:
#   docker compose -f infra/docker-compose.dev.yml -f infra/docker-compose.staging.yml --env-file api/.env.staging up -d
# Copy api/.env.staging.example → api/.env.staging (gitignored).
version: "3.9"

services:
  api:
    env_file:
      - ../api/.env.staging
    environment:
      NODE_ENV: staging
    restart: unless-stopped

  web:
    environment:
      NODE_ENV: staging
    restart: unless-stopped

  postgres:
    environment:
      POSTGRES_DB: aihub_staging
    restart: unless-stopped

  redis:
    restart: unless-stopped
