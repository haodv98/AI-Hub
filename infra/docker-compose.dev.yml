version: "3.9"

networks:
  aihub-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  vault-data:
  keycloak-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:
  # ── PostgreSQL 16 + TimescaleDB ─────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: aihub-postgres
    environment:
      POSTGRES_USER: aihub
      POSTGRES_PASSWORD: aihub_dev_secret
      POSTGRES_DB: aihub_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - aihub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aihub -d aihub_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aihub-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - aihub-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── HashiCorp Vault (dev mode) ───────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: aihub-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: aihub-dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/data
      - ./vault/policies:/vault/policies:ro
    networks:
      - aihub-net
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ─────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: aihub-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_dev_secret
      KC_DB: dev-file
    ports:
      - "8080:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import:ro
    networks:
      - aihub-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── etcd (required by APISix) ────────────────────────────────────────────────
  etcd:
    image: bitnamilegacy/etcd:latest
    container_name: aihub-etcd
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
    ports:
      - "2379:2379"
    networks:
      - aihub-net
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── APISix ───────────────────────────────────────────────────────────────────
  apisix:
    image: apache/apisix:latest
    container_name: aihub-apisix
    environment:
      APISIX_STAND_ALONE: "false"
    ports:
      - "9080:9080"   # Gateway (HTTP)
      - "9443:9443"   # Gateway (HTTPS)
      - "9180:9180"   # Admin API
      - "9091:9091"   # Prometheus metrics
    volumes:
      - ./apisix/conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    networks:
      - aihub-net
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── LiteLLM Proxy ────────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: aihub-litellm
    command: --config /app/config.yaml --port 4000 --detailed_debug
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-dev-master}
      DATABASE_URL: ${LITELLM_DATABASE_URL:-postgresql://aihub:aihub_dev_secret@postgres:5432/litellm_dev}
    ports:
      - "4000:4000"
    volumes:
      - ../gateway/litellm_config.yaml:/app/config.yaml:ro
    networks:
      - aihub-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: aihub-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - aihub-net

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: aihub-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin_dev_secret
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - aihub-net
    depends_on:
      - prometheus
      - loki

  # ── Loki ─────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: aihub-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - aihub-net

  # ── Promtail ─────────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: aihub-promtail
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - aihub-net
    depends_on:
      - loki
