version: "3.9"

services:
  cloudwatch-agent:
    image: amazon/cloudwatch-agent:latest
    container_name: aihub-cloudwatch-agent
    restart: unless-stopped
    environment:
      CW_CONFIG_CONTENT: /etc/cloudwatch/cloudwatch-agent-config.json
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./cloudwatch/cloudwatch-agent-config.json:/etc/cloudwatch/cloudwatch-agent-config.json:ro
      - /var/log/aihub:/var/log/aihub:ro
    command: ["/opt/aws/amazon-cloudwatch-agent/bin/start-amazon-cloudwatch-agent"]
