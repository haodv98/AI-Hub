apiVersion: apps/v1
kind: Deployment
metadata:
  name: aihub-web
  namespace: aihub-staging
  labels:
    app.kubernetes.io/name: aihub-web
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aihub-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aihub-web
    spec:
      containers:
        - name: web
          image: aihub-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
