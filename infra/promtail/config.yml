server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: aihub-app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: aihub-app
          host: aihub-dev
          __path__: /var/log/aihub/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            timestamp: time
      - labels:
          level:
      - output:
          source: msg

  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
            attrs: attrs
      - json:
          expressions:
            tag: attrs.tag
          source: attrs
      - regex:
          expression: '(?P<container_name>[^/]+)$'
          source: tag
      - timestamp:
          format: RFC3339Nano
          source: time
      - labels:
          stream:
          container_name:
      - output:
          source: output

  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: aihub-dev
          __path__: /var/log/*.log
