global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: aihub-dev

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: nestjs-api
    static_configs:
      - targets: ["host.docker.internal:3001"]
    metrics_path: /metrics

  - job_name: apisix
    static_configs:
      - targets: ["apisix:9091"]
    metrics_path: /apisix/prometheus/metrics

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics
