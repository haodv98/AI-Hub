global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: aihub-dev

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: nestjs-api
    static_configs:
      - targets: ["host.docker.internal:3001"]
    metrics_path: /metrics

  - job_name: apisix
    static_configs:
      - targets: ["apisix:9091"]
    metrics_path: /apisix/prometheus/metrics

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]
    metrics_path: /metrics

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
    metrics_path: /metrics

  - job_name: keycloak
    static_configs:
      - targets: ["keycloak:8080"]
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
    metrics_path: /metrics

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics
