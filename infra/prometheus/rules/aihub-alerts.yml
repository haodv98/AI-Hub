groups:
  - name: aihub-api
    interval: 30s
    rules:
      - alert: NestJSApiDown
        expr: up{job="nestjs-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NestJS API is unreachable"
          description: "Prometheus cannot scrape the NestJS API at :3001/metrics for > 1 minute."

      - alert: APISixDown
        expr: up{job="apisix"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "APISix gateway is unreachable"
          description: "Prometheus cannot scrape APISix metrics for > 1 minute."

      - alert: GatewayP99LatencyWarning
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="nestjs-api"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Gateway p99 latency > 75ms"
          description: "Gateway p99 latency breached warning threshold (50ms) for 5 minutes."
          runbook_url: "https://aihub.internal/docs/runbook#gateway-latency-spike"

      - alert: GatewayP99LatencyCritical
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="nestjs-api"}[10m])) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Gateway p99 latency > 100ms"
          description: "Gateway p99 latency breached critical threshold (100ms) for 10 minutes."
          runbook_url: "https://aihub.internal/docs/runbook#gateway-latency-spike"

      - alert: GatewayErrorRateHigh
        expr: |
          (
            rate(http_requests_total{job="nestjs-api", status=~"5.."}[5m])
            /
            rate(http_requests_total{job="nestjs-api"}[5m])
          ) > 0.05
          and rate(http_requests_total{job="nestjs-api"}[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Gateway error rate > 5%"
          description: "More than 5% of requests are returning 5xx responses."
          runbook_url: "https://aihub.internal/docs/runbook#high-5xx-error-rate"
